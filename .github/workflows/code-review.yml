---
name: Code Review

on: # yamllint disable-line rule:truthy
  pull_request:
    types: [opened, ready_for_review]
    branches: [main]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-slim
    if: github.event_name == 'workflow_call' || github.event.pull_request.draft == false
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install anthropic SDK
        run: pip install anthropic==0.51.0

      - name: Review PR with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import subprocess
          import sys
          import urllib.request

          import anthropic

          def get_diff():
              result = subprocess.run(
                  ['git', 'diff', os.environ['BASE_SHA'], os.environ['HEAD_SHA']],
                  capture_output=True, text=True, check=True
              )
              return result.stdout

          def review(diff):
              client = anthropic.Anthropic()
              system_prompt = (
                  "You are a code reviewer for a personal infrastructure and tooling repository. "
                  "Review the git diff for:\n"
                  "1. Correctness bugs: logic errors, off-by-one, race conditions, missing error handling\n"
                  "2. Security issues: injection, unvalidated input, credential exposure\n"
                  "3. Shell script safety: unquoted variables, missing set -e, unsafe patterns\n"
                  "4. Simplification: unnecessary complexity, redundant code\n\n"
                  "Rules:\n"
                  "- Only flag real issues — style and formatting are handled by linters\n"
                  "- Be concise and actionable; one sentence per finding where possible\n"
                  "- Skip changes that are obviously correct boilerplate\n"
                  "- If no issues found, say so briefly\n"
                  "- Format as markdown: one-line summary, then bullet points for findings"
              )
              message = client.messages.create(
                  model="claude-haiku-4-5-20251001",
                  max_tokens=2048,
                  system=[{
                      "type": "text",
                      "text": system_prompt,
                      "cache_control": {"type": "ephemeral"}
                  }],
                  messages=[{
                      "role": "user",
                      "content": f"Review this diff:\n\n```diff\n{diff[:60000]}\n```"
                  }]
              )
              return message.content[0].text

          def post_review(body, event):
              token = os.environ['GH_TOKEN']
              repo = os.environ['REPO']
              pr_number = os.environ['PR_NUMBER']
              url = f"https://api.github.com/repos/{repo}/pulls/{pr_number}/reviews"
              payload = json.dumps({"body": body, "event": event}).encode()
              req = urllib.request.Request(url, data=payload, method='POST')
              req.add_header('Authorization', f'Bearer {token}')
              req.add_header('Accept', 'application/vnd.github+json')
              req.add_header('Content-Type', 'application/json')
              req.add_header('X-GitHub-Api-Version', '2022-11-28')
              with urllib.request.urlopen(req) as resp:
                  print(f"Posted review ({event}): HTTP {resp.status}")

          if not os.environ.get('BASE_SHA') or not os.environ.get('HEAD_SHA'):
              print("No PR context (workflow_dispatch without PR?), skipping review")
              sys.exit(0)

          diff = get_diff()
          if not diff.strip():
              print("Empty diff, skipping review")
              sys.exit(0)

          review_text = review(diff)
          has_issues = "no issues found" not in review_text.lower()
          event = "REQUEST_CHANGES" if has_issues else "COMMENT"
          post_review(f"## Claude Code Review\n\n{review_text}", event)
          PYEOF
