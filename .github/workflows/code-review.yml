---
name: Code Review

on: # yamllint disable-line rule:truthy
  pull_request:
    types: [opened, ready_for_review, synchronize]
    branches: [main]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pull-requests: write
  actions: write

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-slim
    if: github.event_name == 'workflow_call' || github.event.pull_request.draft == false
    timeout-minutes: 10
    env:
      ANTHROPIC_VERSION: "0.51.0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-anthropic-${{ env.ANTHROPIC_VERSION }}-${{ runner.os }}

      - name: Install anthropic SDK
        run: pip install anthropic==${{ env.ANTHROPIC_VERSION }}

      - name: Review PR with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import re
          import subprocess
          import sys
          import time
          import urllib.error
          import urllib.request

          import anthropic

          def get_diff(from_sha, to_sha):
              result = subprocess.run(
                  ['git', 'diff', from_sha, to_sha],
                  capture_output=True, text=True, check=True
              )
              return result.stdout

          def is_ancestor(ancestor_sha, descendant_sha):
              result = subprocess.run(
                  ['git', 'merge-base', '--is-ancestor', ancestor_sha, descendant_sha],
                  capture_output=True
              )
              return result.returncode == 0

          def github_get(path):
              token = os.environ['GH_TOKEN']
              repo = os.environ['REPO']
              url = f"https://api.github.com/repos/{repo}{path}"
              req = urllib.request.Request(url)
              req.add_header('Authorization', f'Bearer {token}')
              req.add_header('Accept', 'application/vnd.github+json')
              req.add_header('X-GitHub-Api-Version', '2022-11-28')
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read())

          def get_prior_claude_reviews():
              try:
                  reviews = github_get(f"/pulls/{os.environ['PR_NUMBER']}/reviews?per_page=100")
                  return [r for r in reviews if '## Claude Code Review' in r.get('body', '')]
              except Exception as e:
                  print(f"Warning: could not fetch prior reviews: {e}")
                  return []

          def extract_reviewed_sha(body):
              match = re.search(r'<!-- reviewed-sha: ([0-9a-f]{7,40}) -->', body)
              return match.group(1) if match else None

          def extract_consider_items(body):
              lines = body.split('\n')
              consider_lines = []
              in_consider = False
              for line in lines:
                  if line.strip() == '### CONSIDER':
                      in_consider = True
                      continue
                  if in_consider:
                      if line.startswith('VERDICT:') or line.startswith('### '):
                          break
                      consider_lines.append(line)
              return '\n'.join(consider_lines).strip()

          def review(diff, prior_consider_blocks):
              client = anthropic.Anthropic(max_retries=3)
              system_prompt = (
                  "You are a code reviewer for a personal infrastructure and tooling repository "
                  "running Gentoo Linux with OpenRC (no systemd). "
                  "Review the git diff for:\n"
                  "1. Correctness bugs: logic errors, off-by-one, race conditions, missing error handling\n"
                  "2. Security issues: injection, unvalidated input, credential exposure\n"
                  "3. Shell script safety: unquoted variables, missing set -e, unsafe patterns\n"
                  "4. Simplification: unnecessary complexity, redundant code\n\n"
                  "Bash style rules (flag violations — linters don't catch all of these):\n"
                  "- Scripts must start with 'set -Eeuo pipefail'\n"
                  "- Use [[ ]] for conditionals, never [ ] (POSIX)\n"
                  "- Use $(command) for substitution, never backticks\n"
                  "- Use (( )) for arithmetic expressions\n"
                  "- CRITICAL: never use ((var++)) or ((var--)) with set -e — "
                  "post-increment returns old value (0 when var=0) causing exit; "
                  "use ((++var)) or ((--var)) instead\n"
                  "- Quote all variable expansions: \"$var\", \"${arr[@]}\" — "
                  "except bare patterns inside [[ ]]\n"
                  "- Use printf instead of echo for formatted or deterministic output\n"
                  "- Iterate arrays with: for item in \"${arr[@]}\"; do\n"
                  "- Use mapfile -t to read lines into arrays\n"
                  "- Never parse ls output\n"
                  "- Avoid unquoted globs or word-splitting\n\n"
                  "General rules:\n"
                  "- Only flag real issues — formatting and syntax are handled by shfmt/shellcheck/yamllint\n"
                  "- Be concise and actionable; one sentence per finding where possible\n"
                  "- Skip changes that are obviously correct boilerplate\n"
                  "- Do NOT flag version numbers, package versions, or software releases as "
                  "invalid or non-existent — you cannot verify release status at runtime and "
                  "your training data is outdated; treat all explicit version pins as intentional\n"
                  "- Do NOT suggest systemd, journalctl, systemctl or any systemd tooling — "
                  "this system uses OpenRC\n\n"
                  "Response format — use exactly this structure:\n\n"
                  "One-line summary of the change.\n\n"
                  "### MUST FIX\n"
                  "Definite bugs, security issues, or correctness problems you are certain about. "
                  "Omit this section (do not print the heading) if there are none.\n\n"
                  "### CONSIDER\n"
                  "Uncertain findings, style suggestions, or simplifications worth noting. "
                  "Omit this section (do not print the heading) if there are none.\n\n"
                  "End your response with exactly one of these two lines (nothing after it):\n"
                  "VERDICT: PASS\n"
                  "VERDICT: ISSUES\n\n"
                  "Use VERDICT: ISSUES only when there are items under MUST FIX. "
                  "Use VERDICT: PASS when there are no MUST FIX items, even if CONSIDER items exist."
              )
              user_content = f"Review this diff:\n\n```diff\n{diff[:60000]}\n```"
              if prior_consider_blocks:
                  combined = '\n\n---\n\n'.join(prior_consider_blocks)
                  user_content += (
                      "\n\n---\n\nThe following CONSIDER items were already raised in previous "
                      "review rounds on this PR. Do not re-raise these suggestions — they have "
                      "already been evaluated by the author (accepted or rejected). Only report "
                      "genuinely new issues not covered by the items below:\n\n"
                      + combined
                  )
              message = client.messages.create(
                  model="claude-sonnet-4-6",
                  max_tokens=4096,
                  system=[{
                      "type": "text",
                      "text": system_prompt,
                      "cache_control": {"type": "ephemeral"}
                  }],
                  messages=[{
                      "role": "user",
                      "content": user_content
                  }]
              )
              return message.content[0].text

          def post_review(body, event):
              token = os.environ['GH_TOKEN']
              repo = os.environ['REPO']
              pr_number = os.environ['PR_NUMBER']
              url = f"https://api.github.com/repos/{repo}/pulls/{pr_number}/reviews"
              payload = json.dumps({"body": body, "event": event}).encode()
              last_exc = None
              for attempt in range(1, 4):
                  req = urllib.request.Request(url, data=payload, method='POST')
                  req.add_header('Authorization', f'Bearer {token}')
                  req.add_header('Accept', 'application/vnd.github+json')
                  req.add_header('Content-Type', 'application/json')
                  req.add_header('X-GitHub-Api-Version', '2022-11-28')
                  try:
                      with urllib.request.urlopen(req, timeout=30) as resp:
                          print(f"Posted review ({event}): HTTP {resp.status}")
                          return
                  except urllib.error.HTTPError as e:
                      if e.code in (401, 403, 422):
                          print(f"GitHub API error {e.code}: {e.reason} — not retrying")
                          raise
                      last_exc = e
                      print(f"GitHub API error {e.code} (attempt {attempt}/3): {e.reason}")
                  except urllib.error.URLError as e:
                      last_exc = e
                      print(f"GitHub connection error (attempt {attempt}/3): {e.reason}")
                  if attempt < 3:
                      time.sleep(2 ** attempt)
              raise RuntimeError("Failed to post review after 3 attempts") from last_exc

          if not os.environ.get('BASE_SHA') or not os.environ.get('HEAD_SHA') or not os.environ.get('PR_NUMBER'):
              print("No PR context (workflow_dispatch without PR?), skipping review")
              sys.exit(0)

          head_sha = os.environ['HEAD_SHA']
          base_sha = os.environ['BASE_SHA']

          prior_reviews = get_prior_claude_reviews()
          prior_reviews_sorted = sorted(prior_reviews, key=lambda r: r.get('submitted_at', ''))

          # Compute diff from last reviewed commit, falling back to PR base
          from_sha = base_sha
          if prior_reviews_sorted:
              last_sha = extract_reviewed_sha(prior_reviews_sorted[-1].get('body', ''))
              if last_sha and last_sha != head_sha and is_ancestor(last_sha, head_sha):
                  from_sha = last_sha
                  print(f"Incremental review from {last_sha[:8]} to {head_sha[:8]}")
              elif last_sha == head_sha:
                  print(f"HEAD {head_sha[:8]} already reviewed, skipping")
                  sys.exit(0)
              else:
                  print(f"Prior review SHA not usable as base, falling back to PR base")

          diff = get_diff(from_sha, head_sha)
          if not diff.strip():
              print("Empty diff, skipping review")
              sys.exit(0)

          # Collect all prior CONSIDER items so Claude doesn't repeat them
          prior_consider_blocks = [
              c for r in prior_reviews_sorted
              if (c := extract_consider_items(r.get('body', '')))
          ]

          review_text = review(diff, prior_consider_blocks)
          last_line = review_text.strip().splitlines()[-1].strip()
          if last_line not in ("VERDICT: PASS", "VERDICT: ISSUES"):
              print(f"Warning: unexpected verdict line {last_line!r} — defaulting to COMMENT")
          has_must_fix = last_line == "VERDICT: ISSUES"
          event = "REQUEST_CHANGES" if has_must_fix else "COMMENT"

          full_body = f"## Claude Code Review\n<!-- reviewed-sha: {head_sha} -->\n\n{review_text}"
          try:
              post_review(full_body, event)
          except Exception as e:
              print(f"Warning: could not post review to GitHub: {e}")
              print("Review output:")
              print(review_text)
              sys.exit(1)
          PYEOF
