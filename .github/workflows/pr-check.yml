---
name: PR Check

on: # yamllint disable-line rule:truthy
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      python-version:
        description: Python version for pre-commit
        type: string
        default: "3.14"
      install-hadolint:
        description: Install hadolint (needed for repos with Dockerfiles)
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-slim
    timeout-minutes: 10
    env:
      SHELLCHECK_VERSION: v0.10.0
      SHELLCHECK_SHA256: 6c881ab0698e4e6ea235245f22832860544f17ba386442fe7e9d629f8cbedf87
      HADOLINT_VERSION: v2.12.0
      PYTHON_VERSION: ${{ inputs.python-version || '3.14' }}
      INSTALL_HADOLINT: ${{ inputs.install-hadolint == false && 'false' || 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute merge base
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            if [[ "$BASE" == "0000000000000000000000000000000000000000" ]]; then
              BASE="$(git rev-parse --verify HEAD~ 2>/dev/null || git rev-parse HEAD)"
            fi
          else
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          fi
          MERGE_BASE="$(git merge-base "$BASE" "$HEAD")"
          echo "MERGE_BASE=${MERGE_BASE}" >> "$GITHUB_ENV"
          echo "HEAD_SHA=${HEAD}" >> "$GITHUB_ENV"

      - name: Compute tools cache key
        run: |
          hadolint_part=""
          [[ "${INSTALL_HADOLINT}" == "true" ]] && hadolint_part="-hadolint-${HADOLINT_VERSION}"
          echo "TOOLS_CACHE_KEY=tools-shellcheck-${SHELLCHECK_VERSION}${hadolint_part}-${{ runner.os }}" \
            >> "$GITHUB_ENV"

      - name: Cache tool binaries
        id: cache-tools
        uses: actions/cache@v5
        with:
          path: ~/.cache/tools
          key: ${{ env.TOOLS_CACHE_KEY }}

      - name: Download shellcheck and hadolint
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.cache/tools

          SHELLCHECK_ARCHIVE="shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          curl -fsSL --retry 3 --retry-delay 5 \
            "https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/${SHELLCHECK_ARCHIVE}" \
            -o "/tmp/${SHELLCHECK_ARCHIVE}"
          echo "${SHELLCHECK_SHA256}  /tmp/${SHELLCHECK_ARCHIVE}" | sha256sum -c -
          tar -xJf "/tmp/${SHELLCHECK_ARCHIVE}" -C /tmp
          install -m 0755 "/tmp/shellcheck-${SHELLCHECK_VERSION}/shellcheck" ~/.cache/tools/shellcheck

          if [[ "${INSTALL_HADOLINT}" == "true" ]]; then
            HADOLINT_BASE="https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}"
            curl -fsSL --retry 3 --retry-delay 5 \
              "${HADOLINT_BASE}/hadolint-Linux-x86_64" \
              -o ~/.cache/tools/hadolint-Linux-x86_64
            curl -fsSL --retry 3 --retry-delay 5 \
              "${HADOLINT_BASE}/hadolint-Linux-x86_64.sha256" \
              -o /tmp/hadolint-Linux-x86_64.sha256
            (cd ~/.cache/tools && sha256sum -c /tmp/hadolint-Linux-x86_64.sha256)
            mv ~/.cache/tools/hadolint-Linux-x86_64 ~/.cache/tools/hadolint
            chmod +x ~/.cache/tools/hadolint
          fi

      - name: Install tool binaries
        run: |
          sudo install -m 0755 ~/.cache/tools/shellcheck /usr/local/bin/shellcheck
          shellcheck --version
          if [[ "${INSTALL_HADOLINT}" == "true" ]]; then
            sudo install -m 0755 ~/.cache/tools/hadolint /usr/local/bin/hadolint
            hadolint --version
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install pre-commit
        run: python -m pip install -r requirements.txt

      - name: Run pre-commit on changed files
        run: >-
          pre-commit run --show-diff-on-failure --color=always
          --from-ref ${{ env.MERGE_BASE }} --to-ref ${{ env.HEAD_SHA }}
        env:
          SKIP: no-commit-to-branch
