---
name: Lint

on: # yamllint disable-line rule:truthy
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    inputs:
      validate-bash:
        description: Enable BASH and SHELL_SHFMT validators
        type: boolean
        default: true
      validate-yaml:
        description: Enable YAML validator
        type: boolean
        default: true
      validate-markdown:
        description: Enable Markdown validator
        type: boolean
        default: true
      validate-github-actions:
        description: Enable GitHub Actions validator
        type: boolean
        default: true
      validate-json:
        description: Enable JSON validator
        type: boolean
        default: false
      shell-shfmt-opts:
        description: Options passed to shfmt (only used when validate-bash is true)
        type: string
        default: "-i 2 -ci"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  super-lint:
    name: Super-Linter
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Configure validators
        run: |
          # Only write VALIDATE_*=true — never false.
          # Super-linter v8+ rejects mixing include (true) and exclude (false) modes.
          # Unmentioned validators simply don't run when any VALIDATE_* is set to true.
          {
            [[ '${{ inputs.validate-bash }}' != 'false' ]] && \
              printf 'VALIDATE_BASH=true\nVALIDATE_SHELL_SHFMT=true\nBASH_EXEC_IGNORE_LIBRARIES=true\n'
            [[ '${{ inputs.validate-yaml }}' != 'false' ]] && echo 'VALIDATE_YAML=true'
            [[ '${{ inputs.validate-markdown }}' != 'false' ]] && echo 'VALIDATE_MARKDOWN=true'
            [[ '${{ inputs.validate-github-actions }}' != 'false' ]] && echo 'VALIDATE_GITHUB_ACTIONS=true'
            [[ '${{ inputs.validate-json }}' == 'true' ]] && echo 'VALIDATE_JSON=true'
            echo "SHELL_SHFMT_OPTS=${{ inputs.shell-shfmt-opts || '-i 2 -ci' }}"
          } >> "$GITHUB_ENV"

      - name: Super-Linter
        uses: super-linter/super-linter@v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINTER_RULES_PATH: .
          VALIDATE_ALL_CODEBASE: true
          DEFAULT_BRANCH: main
          YAML_LINTER_RULES: .yamllint
          MARKDOWN_LINTER_RULES: .markdownlint.json
